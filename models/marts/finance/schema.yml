version: 2

models:
  - name: fct_trips
    description: "Core fact table — one row per trip. Partitioned by trip_date, clustered by city and driver. Powers revenue, surge and fraud dashboards."
    config:
      meta:
        owner: "data-engineering"
        tags: ["finance", "operations", "fraud"]
    columns:
      - name: trip_id
        description: "Unique trip identifier — primary key"
        tests: [unique, not_null]
      - name: rider_id
        description: "Foreign key to dim_riders"
      - name: driver_id
        description: "Foreign key to dim_drivers"
      - name: vehicle_id
        description: "Vehicle used for this trip"
      - name: city_id
        description: "Foreign key to city reference"
      - name: city_name
        description: "Name of the city where trip occurred"
      - name: trip_date
        description: "Date of trip request — partition key"
        tests: [not_null]
      - name: requested_at
        description: "Timestamp when rider requested the trip"
      - name: pickup_at
        description: "Timestamp when driver picked up rider"
      - name: dropoff_at
        description: "Timestamp when rider was dropped off"
      - name: trip_status
        description: "Final trip status: completed, cancelled, or no_show"
        tests:
          - accepted_values:
              arguments:
                values: ['completed', 'cancelled', 'no_show']
      - name: trip_type
        description: "corporate or personal based on is_corporate flag"
        tests:
          - accepted_values:
              arguments:
                values: ['corporate', 'personal']
      - name: payment_method
        description: "How rider paid: card, wallet, or cash"
      - name: payment_provider
        description: "Payment processor used: stripe or paypal"
      - name: trip_duration_minutes
        description: "Minutes from pickup to dropoff. Null for cancelled/no_show trips"
      - name: estimated_fare_gbp
        description: "Initial fare estimate shown to rider before trip"
      - name: actual_fare_gbp
        description: "Final fare charged to rider after trip completion"
        tests: [not_null]
      - name: surge_multiplier
        description: "Surge pricing factor applied. 1.0 = no surge"
      - name: surge_revenue_gbp
        description: "Additional revenue generated by surge pricing (actual - estimated)"
      - name: net_revenue_gbp
        description: "Revenue after deducting payment processing fees"
      - name: payment_attempts
        description: "Total number of payment attempts for this trip"
      - name: failed_payment_attempts
        description: "Number of failed payment attempts"
      - name: is_extreme_surge
        description: "TRUE if surge_multiplier > 10 — potential fraud indicator"
      - name: is_duplicate_payment
        description: "TRUE if trip has more than one successful payment"
      - name: is_failed_payment_on_completed_trip
        description: "TRUE if trip completed but no successful payment recorded — fraud/ops issue"
      - name: is_corporate
        description: "TRUE if trip was booked under a corporate account"

  - name: fct_payments
    description: "Payment fact table — one row per payment attempt including failures. Use for payment reliability and fraud analysis."
    config:
      meta:
        owner: "data-engineering"
        tags: ["finance", "fraud"]
    columns:
      - name: payment_id
        description: "Unique payment identifier — primary key"
        tests: [unique, not_null]
      - name: trip_id
        description: "Foreign key to fct_trips"
      - name: driver_id
        description: "Driver associated with the trip"
      - name: rider_id
        description: "Rider who made the payment"
      - name: city_id
        description: "City where payment occurred"
      - name: payment_status
        description: "success or failed"
        tests:
          - accepted_values:
              arguments:
                values: ['success', 'failed']
      - name: payment_provider
        description: "stripe or paypal"
      - name: currency
        description: "Payment currency — GBP for UK operations"
      - name: amount_gbp
        description: "Gross amount charged to rider"
      - name: processing_fee_gbp
        description: "Fee charged by payment provider"
      - name: net_amount_gbp
        description: "Amount after deducting processing fee"
      - name: trip_status
        description: "Status of the associated trip"
      - name: actual_fare_gbp
        description: "Fare from the associated trip"
      - name: is_failed_on_completed
        description: "TRUE if payment failed on a completed trip — requires investigation"
      - name: is_amount_mismatch
        description: "TRUE if payment amount differs from trip fare by more than £1"
      - name: payment_date
        description: "Date payment was processed"
      - name: payment_created_at
        description: "Full timestamp of payment processing"
